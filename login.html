<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowly — Log In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">F</div>
      <span class="auth-logo-text">Flowly</span>
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to your account to continue.</p>

    <button class="social-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or sign in with email</span></div>

    <div class="form-field">
      <label>Email address</label>
      <input type="email" placeholder="you@company.com" />
    </div>
    <div class="form-field">
      <div class="form-field-row">
        <label>Password</label>
        <a href="#">Forgot password?</a>
      </div>
      <input type="password" placeholder="••••••••" />
    </div>

    <div style="margin-bottom:1.25rem; display:flex; align-items:center; gap:.6rem;">
      <input type="checkbox" id="remember" style="accent-color:var(--purple); width:16px; height:16px;" />
      <label for="remember" style="font-size:.85rem; color:var(--muted); cursor:pointer;">Remember me for 30 days</label>
    </div>

    <button class="btn-primary" onclick="window.location='dashboard.html'">Log In</button>

    <p class="auth-footer-text">Don't have an account? <a href="/signup.html">Sign up free</a></p>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
