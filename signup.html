<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowly — Create Account</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card" style="max-width:480px;">
    <div class="auth-logo">
      <div class="auth-logo-icon">F</div>
      <span class="auth-logo-text">Flowly</span>
    </div>
    <h1 class="auth-title">Start for free</h1>
    <p class="auth-sub">14-day trial, no credit card needed.</p>

    <button class="social-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign up with Google
    </button>

    <div class="auth-divider"><span>or create account with email</span></div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
      <div class="form-field"><label>First name</label><input type="text" placeholder="Sarah" /></div>
      <div class="form-field"><label>Last name</label><input type="text" placeholder="Johnson" /></div>
    </div>
    <div class="form-field"><label>Work email</label><input type="email" placeholder="sarah@company.com" /></div>
    <div class="form-field"><label>Company name</label><input type="text" placeholder="Your company" /></div>
    <div class="form-field">
      <label>Password</label>
      <input type="password" placeholder="Min. 8 characters" />
      <div style="font-size:.75rem; color:var(--muted); margin-top:.35rem;">Use letters, numbers and symbols for a strong password.</div>
    </div>

    <div style="margin-bottom:1.25rem; display:flex; align-items:flex-start; gap:.6rem;">
      <input type="checkbox" id="terms" style="accent-color:var(--purple); width:16px; height:16px; margin-top:2px; flex-shrink:0;" />
      <label for="terms" style="font-size:.82rem; color:var(--muted); cursor:pointer; line-height:1.5;">I agree to the <a href="#" style="color:var(--purple); font-weight:700;">Terms of Service</a> and <a href="#" style="color:var(--purple); font-weight:700;">Privacy Policy</a>.</label>
    </div>

    <button class="btn-primary" onclick="window.location='dashboard.html'">Create Free Account →</button>

    <p class="auth-footer-text">Already have an account? <a href="/login.html">Log in</a></p>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
